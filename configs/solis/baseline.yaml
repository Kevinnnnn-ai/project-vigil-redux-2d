# Solis — suicide-burn landing style. world: differs from lux (suicideBurn engine
# mode -> different hash -> checkpoints are NOT cross-compatible with lux).
# Behavior: binary full-throttle engine, <=2 toggles (one burn, one cutoff).
#
# Booster Landing — control panel. Every behavior/training knob lives here.
# Edit `world:` = different physics -> existing models become incompatible.
# Edit `reward:` / `training:` / `curriculum:` = does NOT invalidate models.

# ── WORLD ── (hashed compatibility group)
world:
  width: 40.0              # x spans [-width/2, +width/2]; side walls clamp (no exit)
  ceiling: 60.0            # y above this clamps
  padWidth: 8.0            # landing pad centered at x = 0
  gravity: 9.8
  dryMass: 1.0             # empty-booster mass (arbitrary units)
  fuelMass: 0.6            # mass of a full tank (so full mass = 1.6)
  maxThrustForce: 30.0     # peak engine FORCE at full spool (full-mass accel 18.75 > g)
  gimbalArm: 1.0           # lever arm from CoM for gimbal torque
  momentInertiaCoef: 1.0   # rotational inertia = coef * mass
  maxGimbal: 0.35          # rad, max nozzle deflection
  throttleResponse: 4.0    # spool ramp rate per second (full sweep ~0.25 s)
  minThrottle: 0.3         # engine floor once lit; at empty mass 0.3*30/1.0=9.0 < g,
                           # so a near-empty booster can still arrest/hover (by design)
  throttleCutoff: 0.05     # command below this shuts the engine off
  linearDrag: 0.05         # per-second velocity damping
  angularDrag: 0.3         # per-second spin damping
  fuelBurnRate: 0.08       # tank fraction per second at full spool (~12.5 s of burn)
  dt: 0.05                 # physics timestep — part of the dynamics
  maxSteps: 600            # 30 s per episode
  maxLandingSpeed: 2.0     # m/s — touch down faster than this = crash
  maxLandingTilt: 0.15     # rad — HUD reference only; superseded as a success gate by legSpan
  maxLandingOmega: 0.5     # rad/s — HUD reference only; superseded by the leg-footprint test
  legSpan: 0.9             # leg-toe half-span from base; sets tip-over angle atan2(legSpan, bodyHalfLen) ~= 0.46 rad
  bodyHalfLen: 1.8         # base-to-CoM distance; the lever the legSpan footprint resists tipping about
  settleTime: 0.4          # s — touchdown spin (omega) is extrapolated this far to judge where it is HEADED
  legDrop: 0.9             # m — how far a leg toe sits below the booster base when upright; sets lowest contact point
  settleStepCap: 120       # max steps in the settling phase after a toe plants; hard ceiling so pivot integration cannot hang
  engineMode: suicideBurn   # binary full-throttle engine, <=2 toggles (one burn, one cutoff)

# ── REWARD ── (isolated; see docs/reward-log.md)
reward:
  preset: baseline
  terminalSuccess: 1.0
  terminalCrash: -1.0
  gentlenessBonus: 0.5     # scaled by margin under the landing limits
  centeringBonus: 0.5      # scaled by closeness to pad center
  shapingCoef: 1.0
  shapingAnneal: linear
  controlCost: 0.01

# ── TRAINING ──
training:
  lr: 3.0e-4
  gamma: 0.99
  gaeLambda: 0.95
  clipEps: 0.2
  epochs: 10
  minibatchSize: 64
  rolloutSteps: 2048
  entCoef: 0.02            # sustains exploration on the hard stages; under the M5
                           # force/lag dynamics 0.01 still let entropy collapse on full
  vfCoef: 0.5
  maxGradNorm: 0.5
  numEnvs: 16              # parallel envs
  evalSeeds: [0, 1, 2]     # judge changes across seeds, not one
  evalEpisodes: 40
  evalEvery: 5             # iters between evals (also drives curriculum promotion)
  totalIters: 300
  hidden: [64, 64]
  device: cpu              # CPU is ~2.8x FASTER than GPU here — the 64x64 net is
                           # launch-bound (vec_env steps envs in a Python loop, so
                           # the GPU is starved by per-tick round-trips). Set 'auto'
                           # to re-enable GPU; checkpoints are device-independent
                           # (same world hash). See observations: CPU_BEATS_GPU_*.
  seedWorkers: auto         # evalSeeds train concurrently (one process per seed);
                            # 'auto' = min(len(evalSeeds), cpu_count); 1 = serial.

# ── CURRICULUM ── (spawn ranges per stage; promotion on eval success rate)
curriculum:
  promoteAt: 0.8           # success rate required to advance a stage
  stages:
    - name: touchdown      # the first rung: low enough that exploration samples
      altitude: [1.0, 3.0] # successes by chance (the success basin is unreachable
      xOffset: [-0.5, 0.5] # by gradient alone from higher spawns — see reward-log)
      vx: [-0.2, 0.2]
      vy: [-1.0, -0.2]
      tilt: [-0.02, 0.02]
      omega: [-0.02, 0.02]
    - name: hop            # low, slow, nearly centered
      altitude: [8.0, 12.0]
      xOffset: [-2.0, 2.0]
      vx: [-0.5, 0.5]
      vy: [-2.0, -0.5]
      tilt: [-0.05, 0.05]
      omega: [-0.05, 0.05]
    - name: drop
      altitude: [20.0, 30.0]
      xOffset: [-6.0, 6.0]
      vx: [-2.0, 2.0]
      vy: [-6.0, -2.0]
      tilt: [-0.15, 0.15]
      omega: [-0.1, 0.1]
    - name: glide          # bridges drop->full; the M5 lag dynamics made the
      altitude: [30.0, 40.0]   # direct drop->full jump too big to transfer skill
      xOffset: [-10.0, 10.0]
      vx: [-3.5, 3.5]
      vy: [-9.0, -3.0]
      tilt: [-0.25, 0.25]
      omega: [-0.2, 0.2]
    - name: full           # the real task; watch/play/evaluate use this
      altitude: [52.0, 52.0]   # fixed drop height (top of screen, just under ceiling 60)
      xOffset: [-6.0, 6.0]     # narrowed horizontal spread near the pad (pad spans [-4, 4])
      vx: [-5.0, 5.0]
      vy: [-12.0, -4.0]
      tilt: [-0.4, 0.4]
      omega: [-0.3, 0.3]

# ── MODE ──
mode: train                # train | watch | play

# ── RUNTIME (watch / play / evaluate) ──
runtime:
  watchModel: best
  model: solis
  evaluateEpisodes: 100
